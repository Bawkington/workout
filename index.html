<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1114">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Climb Strong</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1114;
    --surface: #1a1d23;
    --surface2: #252830;
    --border: #2e3138;
    --fg: #e8e9ed;
    --fg-dim: #7c7f88;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.12);
    --urgent: #ef4444;
    --green: #22c55e;
    --track: #252830;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  button { font-family: inherit; border: none; cursor: pointer; -webkit-appearance: none; }
  input { font-family: inherit; -webkit-appearance: none; outline: none; }
  input:focus { border-color: var(--accent) !important; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  .mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .container { max-width: 480px; margin: 0 auto; padding: 20px 20px calc(20px + var(--safe-bottom)); min-height: 100vh; }

  /* Home */
  .home-header { padding-top: 20px; margin-bottom: 28px; }
  .home-header h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; }
  .home-header .sub { color: var(--fg-dim); font-size: 14px; margin-top: 4px; }

  .day-card {
    width: 100%; text-align: left; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px;
    margin-bottom: 12px; transition: border-color 0.2s, transform 0.15s;
    animation: slideUp 0.4s ease both;
  }
  .day-card:active { transform: scale(0.98); border-color: var(--accent); }
  .day-card .label { font-size: 12px; font-weight: 700; color: var(--accent); }
  .day-card h3 { font-size: 18px; font-weight: 700; margin: 4px 0 8px; color: var(--fg); }
  .day-card .exercises { font-size: 13px; color: var(--fg-dim); line-height: 1.5; }
  .day-card .weight-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .weight-tag {
    padding: 3px 10px; border-radius: 6px; font-size: 12px;
    background: var(--surface2); color: var(--fg-dim);
  }
  .last-date { font-size: 11px; color: var(--fg-dim); }

  .info-box {
    margin-top: 20px; padding: 16px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 13px; color: var(--fg-dim); line-height: 1.6;
  }
  .info-box strong { color: var(--fg); }

  /* Workout */
  .workout-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .back-btn { background: none; color: var(--fg-dim); font-size: 14px; padding: 8px 0; }
  .workout-title h2 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .workout-title .sub { color: var(--fg-dim); font-size: 14px; }

  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Rest timer */
  .rest-card {
    background: var(--surface); border-radius: 16px; padding: 24px;
    margin-bottom: 20px; text-align: center;
    border: 1px solid var(--accent); box-shadow: 0 0 30px var(--accent-glow);
    animation: slideUp 0.3s ease;
  }
  .rest-label {
    font-size: 11px; font-weight: 700; color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
  }
  .timer-circle { position: relative; width: 150px; height: 150px; margin: 0 auto; }
  .timer-circle svg { width: 100%; height: 100%; }
  .timer-text {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700;
  }
  .timer-text.urgent { color: var(--urgent); animation: pulse 0.6s infinite alternate; }
  .skip-btn {
    margin-top: 16px; padding: 8px 28px; border-radius: 8px;
    border: 1px solid var(--border) !important; background: transparent;
    color: var(--fg-dim); font-size: 13px;
  }

  /* Exercise card */
  .ex-card {
    background: var(--surface); border-radius: 16px; padding: 18px 20px;
    margin-bottom: 14px; border: 1px solid var(--border); transition: box-shadow 0.3s;
  }
  .ex-card.complete { box-shadow: inset 0 0 0 2px var(--accent); }
  .ex-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .ex-header h3 { font-size: 16px; font-weight: 700; }
  .ex-header .count { font-size: 12px; font-weight: 600; color: var(--accent); }
  .ex-meta { font-size: 12px; color: var(--fg-dim); margin-bottom: 14px; }

  .set-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    transition: opacity 0.3s;
  }
  .set-row:last-child { border-bottom: none; }
  .set-row.done { opacity: 0.4; }

  .set-num {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .set-num.pending { background: var(--surface2); color: var(--fg-dim); }
  .set-num.checked { background: var(--accent); color: #fff; }

  .set-info { flex: 1; font-size: 13px; color: var(--fg-dim); }

  .weight-input {
    width: 68px; padding: 7px 8px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--fg); font-size: 14px; text-align: center;
  }

  .log-btn {
    padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    transition: all 0.15s;
  }
  .log-btn.active { background: var(--accent); color: #fff; }
  .log-btn.active:active { transform: scale(0.95); }
  .log-btn.inactive { background: var(--surface2); color: var(--fg-dim); }

  .finish-btn {
    width: 100%; padding: 16px; border-radius: 12px; font-size: 16px;
    font-weight: 700; margin-top: 8px; margin-bottom: 32px; transition: all 0.3s;
  }
  .finish-btn.ready { background: var(--green); color: #fff; }
  .finish-btn.not-ready { background: var(--surface2); color: var(--fg-dim); }

  /* Done screen */
  .done-screen { text-align: center; padding-top: 60px; animation: fadeIn 0.4s ease; }
  .done-screen .icon { font-size: 56px; margin-bottom: 16px; }
  .done-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .done-screen .sub { color: var(--fg-dim); font-size: 14px; margin-bottom: 28px; }

  .prog-row {
    background: var(--surface); border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; display: flex; justify-content: space-between;
    align-items: center; border: 1px solid var(--border);
  }
  .prog-row .name { font-size: 14px; font-weight: 600; }
  .prog-row .val { font-size: 14px; font-weight: 700; }
  .prog-row .val.up { color: var(--green); }
  .prog-row .val.same { color: var(--fg-dim); }

  .home-btn {
    margin-top: 24px; width: 100%; padding: 14px; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 600;
  }

  /* History */
  .history-toggle {
    width: 100%; padding: 14px; border-radius: 12px; margin-top: 12px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--fg-dim); font-size: 14px; font-weight: 600;
  }
  .history-entry {
    background: var(--surface); border-radius: 10px; padding: 12px 14px;
    margin-top: 8px; border: 1px solid var(--border); font-size: 13px;
    display: flex; justify-content: space-between; align-items: center;
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const ROUTINE = {
  1: {
    name: "Heavy Pull + Fingers",
    exercises: [
      { id: "pullups", name: "Weighted Pull-ups", sets: 4, reps: 5, type: "weight", rest: 180, inc: 2.5 },
      { id: "hangs", name: "Hangboard Max Hangs", sets: 3, reps: null, hold: 10, type: "hang", rest: 180,
        grips: ["Half Crimp", "Open Hand", "Three Finger Drag"] },
      { id: "legRaise", name: "Hanging Leg Raises", sets: 3, reps: 10, type: "bw", rest: 90 },
    ],
  },
  2: {
    name: "Push + Legs",
    exercises: [
      { id: "bench", name: "Barbell Bench Press", sets: 4, reps: 5, type: "weight", rest: 180, inc: 2.5 },
      { id: "ohp", name: "Overhead Press", sets: 3, reps: 5, type: "weight", rest: 180, inc: 2.5 },
      { id: "deadlift", name: "Deadlift", sets: 3, reps: 5, type: "weight", rest: 180, inc: 5 },
    ],
  },
  4: {
    name: "Pulling Endurance + Rings",
    exercises: [
      { id: "ringPull", name: "Ring Pull-ups / Rows", sets: 4, reps: 10, type: "bw", rest: 120 },
      { id: "ringDips", name: "Ring Dips", sets: 3, reps: 10, type: "bw", rest: 120 },
      { id: "repeaters", name: "Hangboard Repeaters", sets: 2, reps: 6, hold: 6, restIn: 3, type: "repeater", rest: 180 },
      { id: "legRaise2", name: "Hanging Leg Raises", sets: 3, reps: 10, type: "bw", rest: 90 },
    ],
  },
};

// State
let state = loadState();
let view = "home";
let currentDay = null;
let session = {};
let restTimer = null;
let restTotal = 0;
let restRemaining = 0;
let restInterval = null;
let showHistory = false;

function loadState() {
  try {
    const raw = localStorage.getItem("climb-strong-v2");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { history: [], weights: {} };
}

function save() {
  try { localStorage.setItem("climb-strong-v2", JSON.stringify(state)); } catch(e) {}
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ":" + String(sec).padStart(2, "0");
}

function startRest(seconds) {
  clearInterval(restInterval);
  restTotal = seconds;
  restRemaining = seconds;
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      clearInterval(restInterval);
      restInterval = null;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
    render();
  }, 1000);
  render();
}

function skipRest() {
  clearInterval(restInterval);
  restInterval = null;
  restRemaining = 0;
  render();
}

function startDay(dayNum) {
  currentDay = dayNum;
  const day = ROUTINE[dayNum];
  session = {};
  day.exercises.forEach(ex => {
    const lastW = state.weights[ex.id];
    session[ex.id] = {
      sets: Array(ex.sets).fill(false),
      weights: Array(ex.sets).fill(lastW || null),
    };
  });
  view = "workout";
  render();
  window.scrollTo(0, 0);
}

function logSet(exId, setIdx, restSec) {
  session[exId].sets[setIdx] = true;
  startRest(restSec);
  render();
}

function setWeight(exId, setIdx, val) {
  session[exId].weights[setIdx] = val;
  render();
}

function finishWorkout() {
  const day = ROUTINE[currentDay];
  const newWeights = { ...state.weights };
  day.exercises.forEach(ex => {
    if (ex.type === "weight") {
      const d = session[ex.id];
      const allDone = d.sets.every(Boolean);
      const lastW = d.weights[d.weights.length - 1];
      if (lastW) {
        newWeights[ex.id] = allDone ? lastW + ex.inc : lastW;
      }
    }
  });
  state.weights = newWeights;
  state.history.push({
    day: currentDay,
    date: new Date().toISOString().slice(0, 10),
    data: JSON.parse(JSON.stringify(session)),
  });
  save();
  view = "done";
  render();
  window.scrollTo(0, 0);
}

function goHome() {
  clearInterval(restInterval);
  restInterval = null;
  restRemaining = 0;
  view = "home";
  currentDay = null;
  showHistory = false;
  render();
  window.scrollTo(0, 0);
}

function getTotals() {
  if (!currentDay) return [0, 0];
  const day = ROUTINE[currentDay];
  let total = 0, done = 0;
  day.exercises.forEach(ex => {
    total += ex.sets;
    done += (session[ex.id]?.sets?.filter(Boolean).length || 0);
  });
  return [done, total];
}

// Render
function render() {
  const app = document.getElementById("app");
  if (view === "home") renderHome(app);
  else if (view === "workout") renderWorkout(app);
  else if (view === "done") renderDone(app);
}

function renderHome(el) {
  const lastByDay = {};
  state.history.forEach(h => { lastByDay[h.day] = h.date; });

  let html = `
    <div class="home-header">
      <h1>Climb Strong</h1>
      <div class="sub">${state.history.length} workout${state.history.length !== 1 ? "s" : ""} logged</div>
    </div>`;

  Object.entries(ROUTINE).forEach(([num, day], i) => {
    const exNames = day.exercises.map(e => e.name).join(" · ");
    let tags = "";
    day.exercises.filter(e => e.type === "weight").forEach(ex => {
      const w = state.weights[ex.id];
      if (w) tags += `<span class="weight-tag mono">${ex.name.split(" ")[0]}: ${w} lbs</span>`;
    });

    html += `
      <button class="day-card" style="animation-delay:${i * 0.08}s" onclick="startDay(${num})">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="label mono">DAY ${num}</span>
          ${lastByDay[num] ? `<span class="last-date">Last: ${lastByDay[num]}</span>` : ""}
        </div>
        <h3>${day.name}</h3>
        <div class="exercises">${exNames}</div>
        ${tags ? `<div class="weight-tags">${tags}</div>` : ""}
      </button>`;
  });

  html += `
    <div class="info-box">
      <strong>Progression</strong><br>
      Complete all sets → weight goes up next session.<br>Miss a set → repeat the weight.
    </div>`;

  // History toggle
  if (state.history.length > 0) {
    html += `<button class="history-toggle" onclick="showHistory=!showHistory;render()">
      ${showHistory ? "Hide" : "Show"} History (${state.history.length})
    </button>`;

    if (showHistory) {
      const recent = [...state.history].reverse().slice(0, 20);
      recent.forEach(h => {
        html += `<div class="history-entry">
          <span>Day ${h.day} · ${ROUTINE[h.day].name}</span>
          <span class="mono" style="color:var(--fg-dim);font-size:12px">${h.date}</span>
        </div>`;
      });
    }
  }

  el.innerHTML = html;
}

function renderWorkout(el) {
  const day = ROUTINE[currentDay];
  const [done, total] = getTotals();
  const pct = total > 0 ? (done / total) * 100 : 0;

  let html = `
    <div class="workout-top">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <span class="mono" style="font-size:13px;color:var(--fg-dim)">${done}/${total} sets</span>
    </div>
    <div class="workout-title">
      <h2>Day ${currentDay}</h2>
      <div class="sub">${day.name}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  // Rest timer
  if (restInterval || restRemaining > 0) {
    const r = 54;
    const circ = 2 * Math.PI * r;
    const progress = restTotal > 0 ? restRemaining / restTotal : 0;
    const offset = circ * (1 - progress);
    const urgent = restRemaining <= 10 && restRemaining > 0;
    const col = urgent ? "var(--urgent)" : "var(--accent)";

    html += `
      <div class="rest-card">
        <div class="rest-label">Rest</div>
        <div class="timer-circle">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--track)" stroke-width="8"/>
            <circle cx="60" cy="60" r="${r}" fill="none" stroke="${col}" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
              transform="rotate(-90 60 60)"/>
          </svg>
          <div class="timer-text mono ${urgent ? "urgent" : ""}" style="color:${col}">
            ${fmt(restRemaining)}
          </div>
        </div>
        <button class="skip-btn" onclick="skipRest()">Skip</button>
      </div>`;
  }

  // Exercises
  day.exercises.forEach(ex => {
    const d = session[ex.id] || { sets: [], weights: [] };
    const cCount = d.sets.filter(Boolean).length;
    const allDone = cCount === ex.sets;

    html += `<div class="ex-card ${allDone ? "complete" : ""}">
      <div class="ex-header">
        <h3>${ex.name}</h3>
        <span class="count mono">${cCount}/${ex.sets}</span>
      </div>
      <div class="ex-meta">
        Rest: ${fmt(ex.rest)}${ex.type === "weight" && ex.inc ? ` · +${ex.inc} lbs/session` : ""}
      </div>`;

    for (let i = 0; i < ex.sets; i++) {
      const done = d.sets[i];
      let info = "";
      if (ex.type === "hang" && ex.grips) {
        info = `${ex.grips[i] || ex.grips[0]} · ${ex.hold}s`;
      } else if (ex.type === "repeater") {
        info = `${ex.reps} reps · ${ex.hold}s on / ${ex.restIn}s off`;
      } else if (ex.reps) {
        info = `${ex.reps} reps`;
      }

      const weightInput = ex.type === "weight"
        ? `<input type="number" class="weight-input mono" value="${d.weights[i] || ""}"
            placeholder="lbs" ${done ? "disabled" : ""}
            oninput="setWeight('${ex.id}',${i},Number(this.value))">`
        : "";

      html += `
        <div class="set-row ${done ? "done" : ""}">
          <div class="set-num ${done ? "checked" : "pending"}">${done ? "✓" : i + 1}</div>
          <div class="set-info">${info}</div>
          ${weightInput}
          <button class="log-btn ${done ? "inactive" : "active"}"
            ${done ? "disabled" : ""} onclick="logSet('${ex.id}',${i},${ex.rest})">
            ${done ? "Done" : "Log"}
          </button>
        </div>`;
    }
    html += `</div>`;
  });

  html += `<button class="finish-btn ${done === total ? "ready" : "not-ready"}" onclick="finishWorkout()">
    Finish Workout
  </button>`;

  el.innerHTML = html;
}

function renderDone(el) {
  const day = ROUTINE[currentDay];
  const [done, total] = getTotals();

  let progHtml = "";
  day.exercises.filter(e => e.type === "weight").forEach(ex => {
    const d = session[ex.id];
    const allDone = d?.sets?.every(Boolean);
    const lastW = d?.weights?.[d.weights.length - 1];
    if (lastW) {
      progHtml += `<div class="prog-row">
        <span class="name">${ex.name}</span>
        <span class="val mono ${allDone ? "up" : "same"}">
          ${lastW} lbs ${allDone ? "→ " + (lastW + ex.inc) : "(repeat)"}
        </span>
      </div>`;
    }
  });

  el.innerHTML = `
    <div class="done-screen">
      <div class="icon">🧗</div>
      <h1>Workout Complete</h1>
      <div class="sub">${day.name} · ${done}/${total} sets logged</div>
      ${progHtml}
      <button class="home-btn" onclick="goHome()">Back to Home</button>
    </div>`;
}

// Init
render();
</script>
</body>
</html>
