<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1114">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Home Workout</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1114;
    --surface: #1a1d23;
    --surface2: #252830;
    --border: #2e3138;
    --fg: #e8e9ed;
    --fg-dim: #7c7f88;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.12);
    --urgent: #ef4444;
    --green: #22c55e;
    --track: #252830;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  button { font-family: inherit; border: none; cursor: pointer; -webkit-appearance: none; }
  input { font-family: inherit; -webkit-appearance: none; outline: none; }
  input:focus { border-color: var(--accent) !important; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  .mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .container { max-width: 480px; margin: 0 auto; padding: 20px 20px calc(20px + var(--safe-bottom)); min-height: 100vh; }

  /* Home */
  .home-header { padding-top: 20px; margin-bottom: 28px; }
  .home-header h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; }
  .home-header .sub { color: var(--fg-dim); font-size: 14px; margin-top: 4px; }

  .day-card {
    width: 100%; text-align: left; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px;
    margin-bottom: 12px; transition: border-color 0.2s, transform 0.15s;
    animation: slideUp 0.4s ease both;
  }
  .day-card:active { transform: scale(0.98); border-color: var(--accent); }
  .day-card .label { font-size: 12px; font-weight: 700; color: var(--accent); }
  .day-card h3 { font-size: 18px; font-weight: 700; margin: 4px 0 8px; color: var(--fg); }
  .day-card .exercises { font-size: 13px; color: var(--fg-dim); line-height: 1.5; }
  .day-card .weight-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .weight-tag {
    padding: 3px 10px; border-radius: 6px; font-size: 12px;
    background: var(--surface2); color: var(--fg-dim);
  }
  .last-date { font-size: 11px; color: var(--fg-dim); }

  .info-box {
    margin-top: 20px; padding: 16px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 13px; color: var(--fg-dim); line-height: 1.6;
  }
  .info-box strong { color: var(--fg); }

  /* Workout */
  .workout-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .back-btn { background: none; color: var(--fg-dim); font-size: 14px; padding: 8px 0; }
  .workout-title h2 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .workout-title .sub { color: var(--fg-dim); font-size: 14px; }

  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Rest timer */
  .rest-card {
    background: var(--surface); border-radius: 16px; padding: 24px;
    margin-bottom: 20px; text-align: center;
    border: 1px solid var(--accent); box-shadow: 0 0 30px var(--accent-glow);
    animation: slideUp 0.3s ease;
  }
  .rest-label {
    font-size: 11px; font-weight: 700; color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
  }
  .timer-circle { position: relative; width: 150px; height: 150px; margin: 0 auto; }
  .timer-circle svg { width: 100%; height: 100%; }
  .timer-text {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700;
  }
  .timer-text.urgent { color: var(--urgent); animation: pulse 0.6s infinite alternate; }
  .skip-btn {
    margin-top: 16px; padding: 8px 28px; border-radius: 8px;
    border: 1px solid var(--border) !important; background: transparent;
    color: var(--fg-dim); font-size: 13px;
  }

  /* Exercise card */
  .ex-card {
    background: var(--surface); border-radius: 16px; padding: 18px 20px;
    margin-bottom: 14px; border: 1px solid var(--border); transition: box-shadow 0.3s;
  }
  .ex-card.complete { box-shadow: inset 0 0 0 2px var(--accent); }
  .ex-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .ex-header h3 { font-size: 16px; font-weight: 700; }
  .ex-header .count { font-size: 12px; font-weight: 600; color: var(--accent); }
  .ex-meta { font-size: 12px; color: var(--fg-dim); margin-bottom: 14px; }

  .set-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    transition: opacity 0.3s;
  }
  .set-row:last-child { border-bottom: none; }
  .set-row.done { opacity: 0.4; }

  .set-num {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .set-num.pending { background: var(--surface2); color: var(--fg-dim); }
  .set-num.checked { background: var(--accent); color: #fff; }

  .set-info { flex: 1; font-size: 13px; color: var(--fg-dim); }

  .weight-input {
    width: 68px; padding: 7px 8px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--fg); font-size: 14px; text-align: center;
  }

  .log-btn {
    padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    transition: all 0.15s;
  }
  .log-btn.active { background: var(--accent); color: #fff; }
  .log-btn.active:active { transform: scale(0.95); }
  .log-btn.inactive { background: var(--surface2); color: var(--fg-dim); }

  .finish-btn {
    width: 100%; padding: 16px; border-radius: 12px; font-size: 16px;
    font-weight: 700; margin-top: 8px; margin-bottom: 32px; transition: all 0.3s;
  }
  .finish-btn.ready { background: var(--green); color: #fff; }
  .finish-btn.not-ready { background: var(--surface2); color: var(--fg-dim); }

  /* Done screen */
  .done-screen { text-align: center; padding-top: 60px; animation: fadeIn 0.4s ease; }
  .done-screen .icon { font-size: 56px; margin-bottom: 16px; }
  .done-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .done-screen .sub { color: var(--fg-dim); font-size: 14px; margin-bottom: 28px; }

  .prog-row {
    background: var(--surface); border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; display: flex; justify-content: space-between;
    align-items: center; border: 1px solid var(--border);
  }
  .prog-row .name { font-size: 14px; font-weight: 600; }
  .prog-row .val { font-size: 14px; font-weight: 700; }
  .prog-row .val.up { color: var(--green); }
  .prog-row .val.same { color: var(--fg-dim); }

  .home-btn {
    margin-top: 24px; width: 100%; padding: 14px; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 600;
  }

  /* History */
  .history-toggle {
    width: 100%; padding: 14px; border-radius: 12px; margin-top: 12px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--fg-dim); font-size: 14px; font-weight: 600;
  }
  .grip-header {
    font-size: 13px; font-weight: 700; color: var(--accent);
    padding: 10px 0 4px; margin-top: 4px;
    border-top: 1px solid var(--border);
  }
  .grip-header:first-of-type { border-top: none; margin-top: 0; }

  .history-entry {
    background: var(--surface); border-radius: 10px; padding: 12px 14px;
    margin-top: 8px; border: 1px solid var(--border); font-size: 13px;
    display: flex; justify-content: space-between; align-items: center;
  }

  /* Stats */
  .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .stats-header h2 { font-size: 22px; font-weight: 700; }

  .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 12px; text-align: center;
  }
  .stat-card .stat-val { font-size: 24px; font-weight: 800; margin-bottom: 2px; }
  .stat-card .stat-label { font-size: 11px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .stats-section { margin-bottom: 20px; }
  .stats-section h3 {
    font-size: 12px; font-weight: 700; color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }

  .stat-ex-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .stat-ex-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .stat-ex-row { display: flex; justify-content: space-between; align-items: center; }
  .stat-ex-trend { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .stat-ex-values { display: flex; gap: 4px; align-items: baseline; }
  .stat-ex-values span {
    padding: 2px 7px; border-radius: 5px; font-size: 12px;
    background: var(--surface2); color: var(--fg-dim);
  }
  .stat-ex-values span:last-child { background: var(--accent); color: #fff; font-weight: 700; }
  .stat-pr { font-size: 12px; color: var(--green); font-weight: 700; margin-top: 6px; }
  .stat-arrow { font-size: 16px; font-weight: 700; }
  .stat-arrow.up { color: var(--green); }
  .stat-arrow.flat { color: var(--fg-dim); }
  .stat-arrow.down { color: var(--urgent); }

  .stat-empty { text-align: center; padding: 40px 20px; color: var(--fg-dim); font-size: 14px; }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const ROUTINE = {
  1: {
    name: "Heavy Pull + Fingers",
    exercises: [
      { id: "pullups", name: "Weighted Pull-ups", sets: 4, reps: 5, type: "weight", rest: 180, inc: 2.5 },
      { id: "hangs", name: "Hangboard Max Hangs", setsPerGrip: 3, hold: 10, type: "hang", rest: 180,
        grips: ["Half Crimp", "Three Finger Drag"] },
      { id: "legRaise", name: "Hanging Leg Raises", sets: 3, reps: 10, type: "bw", rest: 90 },
    ],
  },
  3: {
    name: "Push + Legs",
    exercises: [
      { id: "bench", name: "Barbell Bench Press", sets: 4, reps: 5, type: "weight", rest: 180, inc: 2.5 },
      { id: "ohp", name: "Overhead Press", sets: 3, reps: 5, type: "weight", rest: 180, inc: 2.5 },
      { id: "deadlift", name: "Deadlift", sets: 3, reps: 5, type: "weight", rest: 180, inc: 5 },
    ],
  },
  5: {
    name: "Pulling Endurance + Rings",
    exercises: [
      { id: "ringPull", name: "Ring Rows", sets: 4, reps: 10, type: "weight", rest: 120, inc: 2.5 },
      { id: "ringDips", name: "Ring Dips", sets: 3, reps: 10, type: "weight", rest: 120, inc: 2.5 },
      { id: "repeaters", name: "Hangboard Repeaters", sets: 2, reps: 6, hold: 6, restIn: 3, type: "repeater", rest: 180, inc: 2.5 },
      { id: "legRaise2", name: "Hanging Leg Raises", sets: 3, reps: 10, type: "bw", rest: 90 },
    ],
  },
};

// State
let state = loadState();
let view = "home";
let currentDay = null;
let session = {};
let restTimer = null;
let restTotal = 0;
let restRemaining = 0;
let restInterval = null;
let showHistory = false;

function loadState() {
  try {
    const raw = localStorage.getItem("climb-strong-v2");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { history: [], weights: {} };
}

function save() {
  try { localStorage.setItem("climb-strong-v2", JSON.stringify(state)); } catch(e) {}
}

function getExSets(ex) {
  return ex.grips ? ex.grips.length * ex.setsPerGrip : ex.sets;
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ":" + String(sec).padStart(2, "0");
}

function startRest(seconds) {
  clearInterval(restInterval);
  restTotal = seconds;
  restRemaining = seconds;
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      clearInterval(restInterval);
      restInterval = null;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
    render();
  }, 1000);
  render();
}

function skipRest() {
  clearInterval(restInterval);
  restInterval = null;
  restRemaining = 0;
  render();
}

function startDay(dayNum) {
  currentDay = dayNum;
  const day = ROUTINE[dayNum];
  session = {};
  day.exercises.forEach(ex => {
    const total = getExSets(ex);
    if (ex.type === "hang" && ex.grips) {
      const weights = [];
      for (let i = 0; i < total; i++) {
        const gi = Math.floor(i / ex.setsPerGrip);
        weights.push(state.weights[ex.id + "_" + gi] || null);
      }
      session[ex.id] = { sets: Array(total).fill(false), weights };
    } else {
      const lastW = state.weights[ex.id];
      session[ex.id] = {
        sets: Array(total).fill(false),
        weights: Array(total).fill(lastW || null),
      };
    }
  });
  view = "workout";
  render();
  window.scrollTo(0, 0);
}

function logSet(exId, setIdx, restSec) {
  session[exId].sets[setIdx] = true;
  startRest(restSec);
  render();
}

function setWeight(exId, setIdx, val) {
  session[exId].weights[setIdx] = val;
  render();
}

function finishWorkout() {
  const day = ROUTINE[currentDay];
  const newWeights = { ...state.weights };
  day.exercises.forEach(ex => {
    if (ex.type === "weight" || (ex.type === "repeater" && ex.inc)) {
      const d = session[ex.id];
      const allDone = d.sets.every(Boolean);
      const lastW = d.weights[d.weights.length - 1];
      if (lastW) {
        newWeights[ex.id] = allDone ? lastW + ex.inc : lastW;
      }
    } else if (ex.type === "hang" && ex.grips) {
      const d = session[ex.id];
      ex.grips.forEach((grip, gi) => {
        const start = gi * ex.setsPerGrip;
        const gripWeights = d.weights.slice(start, start + ex.setsPerGrip).filter(Boolean);
        if (gripWeights.length > 0) {
          newWeights[ex.id + "_" + gi] = Math.max(...gripWeights);
        }
      });
    }
  });
  state.weights = newWeights;
  state.history.push({
    day: currentDay,
    date: new Date().toISOString().slice(0, 10),
    data: JSON.parse(JSON.stringify(session)),
  });
  save();
  view = "done";
  render();
  window.scrollTo(0, 0);
}

function goHome() {
  clearInterval(restInterval);
  restInterval = null;
  restRemaining = 0;
  view = "home";
  currentDay = null;
  showHistory = false;
  render();
  window.scrollTo(0, 0);
}

function getTotals() {
  if (!currentDay) return [0, 0];
  const day = ROUTINE[currentDay];
  let total = 0, done = 0;
  day.exercises.forEach(ex => {
    total += getExSets(ex);
    done += (session[ex.id]?.sets?.filter(Boolean).length || 0);
  });
  return [done, total];
}

// Render
function render() {
  const app = document.getElementById("app");
  if (view === "home") renderHome(app);
  else if (view === "workout") renderWorkout(app);
  else if (view === "done") renderDone(app);
  else if (view === "stats") renderStats(app);
}

function renderHome(el) {
  const lastByDay = {};
  state.history.forEach(h => { lastByDay[h.day] = h.date; });

  let html = `
    <div class="home-header" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <h1>Home Workout</h1>
        <div class="sub">${state.history.length} workout${state.history.length !== 1 ? "s" : ""} logged</div>
      </div>
      <button onclick="showStats()" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;color:var(--fg);font-size:13px;font-weight:600;margin-top:4px">Stats</button>
    </div>`;

  Object.entries(ROUTINE).forEach(([num, day], i) => {
    const exNames = day.exercises.map(e => e.name).join(" · ");
    let tags = "";
    day.exercises.filter(e => e.type === "weight" || (e.type === "repeater" && e.inc)).forEach(ex => {
      const w = state.weights[ex.id];
      if (w) tags += `<span class="weight-tag mono">${ex.name.split(" ")[0]}: ${w} lbs</span>`;
    });
    day.exercises.filter(e => e.type === "hang" && e.grips).forEach(ex => {
      ex.grips.forEach((grip, gi) => {
        const w = state.weights[ex.id + "_" + gi];
        if (w) tags += `<span class="weight-tag mono">${grip}: +${w} lbs</span>`;
      });
    });

    html += `
      <button class="day-card" style="animation-delay:${i * 0.08}s" onclick="startDay(${num})">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="label mono">DAY ${num}</span>
          ${lastByDay[num] ? `<span class="last-date">Last: ${lastByDay[num]}</span>` : ""}
        </div>
        <h3>${day.name}</h3>
        <div class="exercises">${exNames}</div>
        ${tags ? `<div class="weight-tags">${tags}</div>` : ""}
      </button>`;
  });

  html += `
    <div class="info-box">
      <strong>Progression</strong><br>
      Complete all sets → weight goes up next session.<br>Miss a set → repeat the weight.
    </div>`;

  // History toggle
  if (state.history.length > 0) {
    html += `<button class="history-toggle" onclick="showHistory=!showHistory;render()">
      ${showHistory ? "Hide" : "Show"} History (${state.history.length})
    </button>`;

    if (showHistory) {
      const recent = [...state.history].reverse().slice(0, 20);
      recent.forEach(h => {
        html += `<div class="history-entry">
          <span>Day ${h.day} · ${ROUTINE[h.day].name}</span>
          <span class="mono" style="color:var(--fg-dim);font-size:12px">${h.date}</span>
        </div>`;
      });
    }
  }

  el.innerHTML = html;
}

function renderWorkout(el) {
  const day = ROUTINE[currentDay];
  const [done, total] = getTotals();
  const pct = total > 0 ? (done / total) * 100 : 0;

  let html = `
    <div class="workout-top">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <span class="mono" style="font-size:13px;color:var(--fg-dim)">${done}/${total} sets</span>
    </div>
    <div class="workout-title">
      <h2>Day ${currentDay}</h2>
      <div class="sub">${day.name}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  // Rest timer
  if (restInterval || restRemaining > 0) {
    const r = 54;
    const circ = 2 * Math.PI * r;
    const progress = restTotal > 0 ? restRemaining / restTotal : 0;
    const offset = circ * (1 - progress);
    const urgent = restRemaining <= 10 && restRemaining > 0;
    const col = urgent ? "var(--urgent)" : "var(--accent)";

    html += `
      <div class="rest-card">
        <div class="rest-label">Rest</div>
        <div class="timer-circle">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--track)" stroke-width="8"/>
            <circle cx="60" cy="60" r="${r}" fill="none" stroke="${col}" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
              transform="rotate(-90 60 60)"/>
          </svg>
          <div class="timer-text mono ${urgent ? "urgent" : ""}" style="color:${col}">
            ${fmt(restRemaining)}
          </div>
        </div>
        <button class="skip-btn" onclick="skipRest()">Skip</button>
      </div>`;
  }

  // Exercises
  day.exercises.forEach(ex => {
    const d = session[ex.id] || { sets: [], weights: [] };
    const totalSets = getExSets(ex);
    const cCount = d.sets.filter(Boolean).length;
    const allDone = cCount === totalSets;

    html += `<div class="ex-card ${allDone ? "complete" : ""}">
      <div class="ex-header">
        <h3>${ex.name}</h3>
        <span class="count mono">${cCount}/${totalSets}</span>
      </div>
      <div class="ex-meta">
        Rest: ${fmt(ex.rest)}${ex.type === "weight" && ex.inc ? ` · +${ex.inc} lbs/session` : ""}
      </div>`;

    if (ex.type === "hang" && ex.grips) {
      ex.grips.forEach((grip, gi) => {
        html += `<div class="grip-header">${grip}</div>`;
        for (let s = 0; s < ex.setsPerGrip; s++) {
          const i = gi * ex.setsPerGrip + s;
          const done = d.sets[i];
          html += `
            <div class="set-row ${done ? "done" : ""}">
              <div class="set-num ${done ? "checked" : "pending"}">${done ? "✓" : s + 1}</div>
              <div class="set-info">${ex.hold}s hang</div>
              <input type="number" class="weight-input mono" value="${d.weights[i] || ""}"
                placeholder="+lbs" ${done ? "disabled" : ""}
                oninput="setWeight('${ex.id}',${i},Number(this.value))">
              <button class="log-btn ${done ? "inactive" : "active"}"
                ${done ? "disabled" : ""} onclick="logSet('${ex.id}',${i},${ex.rest})">
                ${done ? "Done" : "Log"}
              </button>
            </div>`;
        }
      });
    } else {
      for (let i = 0; i < totalSets; i++) {
        const done = d.sets[i];
        let info = "";
        if (ex.type === "repeater") {
          info = `${ex.reps} reps · ${ex.hold}s on / ${ex.restIn}s off`;
        } else if (ex.reps) {
          info = `${ex.reps} reps`;
        }

        const weightInput = ex.type !== "bw"
          ? `<input type="number" class="weight-input mono" value="${d.weights[i] || ""}"
              placeholder="${ex.type === "repeater" ? "+lbs" : "lbs"}" ${done ? "disabled" : ""}
              oninput="setWeight('${ex.id}',${i},Number(this.value))">`
          : "";

        html += `
          <div class="set-row ${done ? "done" : ""}">
            <div class="set-num ${done ? "checked" : "pending"}">${done ? "✓" : i + 1}</div>
            <div class="set-info">${info}</div>
            ${weightInput}
            <button class="log-btn ${done ? "inactive" : "active"}"
              ${done ? "disabled" : ""} onclick="logSet('${ex.id}',${i},${ex.rest})">
              ${done ? "Done" : "Log"}
            </button>
          </div>`;
      }
    }
    html += `</div>`;
  });

  html += `<button class="finish-btn ${done === total ? "ready" : "not-ready"}" onclick="finishWorkout()">
    Finish Workout
  </button>`;

  el.innerHTML = html;
}

function renderDone(el) {
  const day = ROUTINE[currentDay];
  const [done, total] = getTotals();

  let progHtml = "";
  day.exercises.filter(e => e.type === "weight" || (e.type === "repeater" && e.inc)).forEach(ex => {
    const d = session[ex.id];
    const allDone = d?.sets?.every(Boolean);
    const lastW = d?.weights?.[d.weights.length - 1];
    if (lastW) {
      progHtml += `<div class="prog-row">
        <span class="name">${ex.name}</span>
        <span class="val mono ${allDone ? "up" : "same"}">
          ${lastW} lbs ${allDone ? "→ " + (lastW + ex.inc) : "(repeat)"}
        </span>
      </div>`;
    }
  });
  day.exercises.filter(e => e.type === "hang" && e.grips).forEach(ex => {
    const d = session[ex.id];
    ex.grips.forEach((grip, gi) => {
      const start = gi * ex.setsPerGrip;
      const gripWeights = d.weights.slice(start, start + ex.setsPerGrip).filter(Boolean);
      if (gripWeights.length > 0) {
        const maxW = Math.max(...gripWeights);
        progHtml += `<div class="prog-row">
          <span class="name">${grip}</span>
          <span class="val mono same">+${maxW} lbs</span>
        </div>`;
      }
    });
  });

  el.innerHTML = `
    <div class="done-screen">
      <div class="icon">🧗</div>
      <h1>Workout Complete</h1>
      <div class="sub">${day.name} · ${done}/${total} sets logged</div>
      ${progHtml}
      <button class="home-btn" onclick="goHome()">Back to Home</button>
    </div>`;
}

function showStats() {
  view = "stats";
  render();
  window.scrollTo(0, 0);
}

function renderStats(el) {
  const hist = state.history;
  const totalWorkouts = hist.length;

  // Workouts this week (Mon-Sun)
  const now = new Date();
  const dayOfWeek = (now.getDay() + 6) % 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek);
  monday.setHours(0, 0, 0, 0);
  const thisWeek = hist.filter(h => new Date(h.date + "T12:00:00") >= monday).length;

  // Streak: consecutive weeks with at least 1 workout
  let streak = 0;
  if (hist.length > 0) {
    const weekStart = d => {
      const dt = new Date(d + "T12:00:00");
      const dow = (dt.getDay() + 6) % 7;
      dt.setDate(dt.getDate() - dow);
      return dt.toISOString().slice(0, 10);
    };
    const weeks = new Set(hist.map(h => weekStart(h.date)));
    let check = new Date(monday);
    while (weeks.has(check.toISOString().slice(0, 10))) {
      streak++;
      check.setDate(check.getDate() - 7);
    }
  }

  let html = `
    <div class="stats-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2>Progression</h2>
      <div></div>
    </div>
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-val mono">${totalWorkouts}</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-val mono">${thisWeek}</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-val mono">${streak}w</div>
        <div class="stat-label">Streak</div>
      </div>
    </div>`;

  if (totalWorkouts === 0) {
    html += `<div class="stat-empty">Complete a workout to see your progression.</div>`;
    el.innerHTML = html;
    return;
  }

  // Gather per-exercise data from history
  const exData = {};
  const allExercises = [];
  Object.values(ROUTINE).forEach(day => {
    day.exercises.forEach(ex => {
      if (!allExercises.find(e => e.id === ex.id)) allExercises.push(ex);
    });
  });

  allExercises.forEach(ex => {
    if (ex.type === "weight" || (ex.type === "repeater" && ex.inc)) {
      const entries = [];
      hist.forEach(h => {
        const d = h.data[ex.id];
        if (d) {
          const ws = d.weights.filter(Boolean);
          if (ws.length > 0) entries.push({ date: h.date, weight: Math.max(...ws), allDone: d.sets.every(Boolean) });
        }
      });
      if (entries.length > 0) exData[ex.id] = { type: "weight", name: ex.name, entries };
    } else if (ex.type === "hang" && ex.grips) {
      ex.grips.forEach((grip, gi) => {
        const key = ex.id + "_" + gi;
        const entries = [];
        hist.forEach(h => {
          const d = h.data[ex.id];
          if (d) {
            const start = gi * (ex.setsPerGrip || 1);
            const end = start + (ex.setsPerGrip || 1);
            const ws = d.weights.slice(start, end).filter(Boolean);
            if (ws.length > 0) entries.push({ date: h.date, weight: Math.max(...ws) });
          }
        });
        if (entries.length > 0) exData[key] = { type: "hang", name: grip, entries };
      });
    }
  });

  // Strength progression
  const weightExKeys = Object.keys(exData).filter(k => exData[k].type === "weight");
  if (weightExKeys.length > 0) {
    html += `<div class="stats-section"><h3>Strength</h3>`;
    weightExKeys.forEach(k => {
      const d = exData[k];
      const recent = d.entries.slice(-6);
      const pr = Math.max(...d.entries.map(e => e.weight));
      const last = recent[recent.length - 1].weight;
      const prev = recent.length > 1 ? recent[recent.length - 2].weight : last;
      const arrow = last > prev ? "↑" : last < prev ? "↓" : "→";
      const arrowClass = last > prev ? "up" : last < prev ? "down" : "flat";

      html += `<div class="stat-ex-card">
        <div class="stat-ex-name">${d.name}</div>
        <div class="stat-ex-row">
          <div class="stat-ex-values">
            ${recent.map(e => `<span class="mono">${e.weight}</span>`).join("")}
          </div>
          <span class="stat-arrow ${arrowClass}">${arrow}</span>
        </div>
        <div class="stat-pr">PR: ${pr} lbs</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Hangboard progression
  const hangKeys = Object.keys(exData).filter(k => exData[k].type === "hang");
  if (hangKeys.length > 0) {
    html += `<div class="stats-section"><h3>Hangboard</h3>`;
    hangKeys.forEach(k => {
      const d = exData[k];
      const recent = d.entries.slice(-6);
      const pr = Math.max(...d.entries.map(e => e.weight));
      const last = recent[recent.length - 1].weight;
      const prev = recent.length > 1 ? recent[recent.length - 2].weight : last;
      const arrow = last > prev ? "↑" : last < prev ? "↓" : "→";
      const arrowClass = last > prev ? "up" : last < prev ? "down" : "flat";

      html += `<div class="stat-ex-card">
        <div class="stat-ex-name">${d.name}</div>
        <div class="stat-ex-row">
          <div class="stat-ex-values">
            ${recent.map(e => `<span class="mono">+${e.weight}</span>`).join("")}
          </div>
          <span class="stat-arrow ${arrowClass}">${arrow}</span>
        </div>
        <div class="stat-pr">PR: +${pr} lbs</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Recent workouts
  html += `<div class="stats-section"><h3>Recent Workouts</h3>`;
  const recent = [...hist].reverse().slice(0, 10);
  recent.forEach(h => {
    const day = ROUTINE[h.day];
    const d = h.data;
    let setsLogged = 0, totalSets = 0;
    if (day) {
      day.exercises.forEach(ex => {
        const total = getExSets(ex);
        totalSets += total;
        setsLogged += (d[ex.id]?.sets?.filter(Boolean).length || 0);
      });
    }
    html += `<div class="history-entry">
      <div>
        <div style="font-weight:600">Day ${h.day} · ${day?.name || "Unknown"}</div>
        <div style="font-size:11px;color:var(--fg-dim);margin-top:2px">${setsLogged}/${totalSets} sets</div>
      </div>
      <span class="mono" style="color:var(--fg-dim);font-size:12px">${h.date}</span>
    </div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
}

// Init
render();
</script>
</body>
</html>
