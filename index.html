<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1114">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Climblift</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0d10;
    --surface: #16181e;
    --surface2: #1e2028;
    --surface3: #262830;
    --border: #262830;
    --border-light: #2f323c;
    --fg: #eaebef;
    --fg-mid: #a0a3ad;
    --fg-dim: #6b6e78;
    --accent: #4f8ff7;
    --accent-soft: rgba(79, 143, 247, 0.1);
    --accent-glow: rgba(79, 143, 247, 0.15);
    --accent2: #6ba3f9;
    --urgent: #f25555;
    --green: #34d87a;
    --green-soft: rgba(52, 216, 122, 0.1);
    --amber: #f5a623;
    --track: #1e2028;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 7px;
    --shadow: 0 2px 12px rgba(0,0,0,0.25);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  button { font-family: inherit; border: none; cursor: pointer; -webkit-appearance: none; }
  input { font-family: inherit; -webkit-appearance: none; outline: none; }
  input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent-soft); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  .mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .container { max-width: 480px; margin: 0 auto; padding: 20px 18px calc(20px + var(--safe-bottom)); min-height: 100vh; }

  /* Home */
  .home-header { padding-top: 24px; margin-bottom: 32px; }
  .home-header h1 {
    font-size: 32px; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--fg) 0%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .home-header .sub { color: var(--fg-dim); font-size: 13px; margin-top: 6px; letter-spacing: 0.2px; }
  .stats-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-xs);
    padding: 9px 18px; color: var(--fg-mid); font-size: 13px; font-weight: 600;
    transition: all 0.2s; margin-top: 6px;
  }
  .stats-btn:active { transform: scale(0.96); background: var(--surface3); }

  .day-card {
    width: 100%; text-align: left; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
    margin-bottom: 10px; transition: all 0.2s ease;
    animation: slideUp 0.35s ease both; box-shadow: var(--shadow);
  }
  .day-card:active { transform: scale(0.985); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-soft); }
  .day-card .label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1.2px; }
  .day-card h3 { font-size: 18px; font-weight: 700; margin: 6px 0 8px; color: var(--fg); letter-spacing: -0.3px; }
  .day-card .exercises { font-size: 12.5px; color: var(--fg-dim); line-height: 1.6; }
  .day-card .weight-tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 5px; }
  .weight-tag {
    padding: 4px 10px; border-radius: var(--radius-xs); font-size: 11px;
    background: var(--accent-soft); color: var(--accent2); font-weight: 500;
  }
  .last-date { font-size: 11px; color: var(--fg-dim); font-weight: 500; }

  .info-box {
    margin-top: 20px; padding: 16px 18px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    font-size: 12.5px; color: var(--fg-dim); line-height: 1.7;
  }
  .info-box strong { color: var(--fg-mid); }

  /* Workout */
  .workout-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-top: 4px; }
  .back-btn { background: none; color: var(--fg-dim); font-size: 14px; padding: 8px 0; font-weight: 500; transition: color 0.2s; }
  .back-btn:active { color: var(--fg); }
  .workout-title h2 { font-size: 24px; font-weight: 800; margin-bottom: 3px; letter-spacing: -0.5px; }
  .workout-title .sub { color: var(--fg-dim); font-size: 13px; }

  .progress-bar { height: 3px; background: var(--surface3); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

  /* Rest timer */
  .rest-card {
    background: var(--surface); border-radius: var(--radius); padding: 28px;
    margin-bottom: 20px; text-align: center;
    border: 1px solid rgba(79,143,247,0.3); box-shadow: 0 0 40px var(--accent-glow), var(--shadow);
    animation: scaleIn 0.3s ease;
  }
  .rest-label {
    font-size: 10px; font-weight: 700; color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 18px;
  }
  .timer-circle { position: relative; width: 140px; height: 140px; margin: 0 auto; }
  .timer-circle svg { width: 100%; height: 100%; filter: drop-shadow(0 0 8px var(--accent-glow)); }
  .timer-text {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 700; letter-spacing: -1px;
  }
  .timer-text.urgent { color: var(--urgent); animation: pulse 0.6s infinite alternate; }
  .skip-btn {
    margin-top: 18px; padding: 9px 32px; border-radius: var(--radius-xs);
    border: 1px solid var(--border-light) !important; background: var(--surface2);
    color: var(--fg-dim); font-size: 13px; font-weight: 500; transition: all 0.15s;
  }
  .skip-btn:active { background: var(--surface3); }

  /* Exercise card */
  .ex-card {
    background: var(--surface); border-radius: var(--radius); padding: 18px 18px;
    margin-bottom: 12px; border: 1px solid var(--border); transition: all 0.3s; box-shadow: var(--shadow);
  }
  .ex-card.complete { border-color: rgba(52,216,122,0.3); box-shadow: 0 0 20px var(--green-soft), var(--shadow); }
  .ex-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .ex-header h3 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .ex-header .count { font-size: 12px; font-weight: 600; color: var(--accent); }
  .ex-meta { font-size: 11.5px; color: var(--fg-dim); margin-bottom: 12px; }

  .set-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 0; border-bottom: 1px solid var(--border);
    transition: opacity 0.3s;
  }
  .set-row:last-child { border-bottom: none; }
  .set-row.done { opacity: 0.35; }
  .set-row.warmup .set-info { color: var(--fg-dim); font-style: italic; }

  .set-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0; transition: all 0.2s;
  }
  .set-num.pending { background: var(--surface2); color: var(--fg-dim); }
  .set-num.checked { background: var(--accent); color: #fff; box-shadow: 0 2px 8px var(--accent-glow); }

  .set-info { flex: 1; font-size: 13px; color: var(--fg-dim); display: flex; align-items: center; gap: 4px; }

  .weight-input {
    width: 64px; padding: 7px 6px; border-radius: var(--radius-xs);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--fg); font-size: 13px; text-align: center; transition: all 0.2s;
  }
  .reps-input {
    width: 36px; padding: 5px 3px; border-radius: 5px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--fg); font-size: 12px; text-align: center; transition: all 0.2s;
  }
  .reps-input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent-soft); }
  .reps-label { font-size: 11px; color: var(--fg-dim); white-space: nowrap; }

  .log-btn {
    padding: 7px 14px; border-radius: var(--radius-xs); font-size: 12.5px; font-weight: 600;
    transition: all 0.15s; letter-spacing: 0.2px;
  }
  .log-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 10px var(--accent-glow); }
  .log-btn.active:active { transform: scale(0.94); }
  .log-btn.inactive { background: var(--surface2); color: var(--fg-dim); }

  .finish-btn {
    width: 100%; padding: 16px; border-radius: var(--radius-sm); font-size: 15px;
    font-weight: 700; margin-top: 10px; margin-bottom: 32px; transition: all 0.3s;
    letter-spacing: 0.2px;
  }
  .finish-btn.ready { background: linear-gradient(135deg, var(--green), #2bc466); color: #fff; box-shadow: 0 4px 16px rgba(52,216,122,0.2); }
  .finish-btn.ready:active { transform: scale(0.98); }
  .finish-btn.not-ready { background: var(--surface2); color: var(--fg-dim); }

  /* Done screen */
  .done-screen { text-align: center; padding-top: 60px; animation: scaleIn 0.4s ease; }
  .done-screen .icon { font-size: 56px; margin-bottom: 20px; }
  .done-screen h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
  .done-screen .sub { color: var(--fg-dim); font-size: 13px; margin-bottom: 28px; }

  .prog-row {
    background: var(--surface); border-radius: var(--radius-sm); padding: 14px 16px;
    margin-bottom: 8px; display: flex; justify-content: space-between;
    align-items: center; border: 1px solid var(--border); box-shadow: var(--shadow);
  }
  .prog-row .name { font-size: 13px; font-weight: 600; }
  .prog-row .val { font-size: 13px; font-weight: 700; }
  .prog-row .val.up { color: var(--green); }
  .prog-row .val.same { color: var(--fg-dim); }

  .home-btn {
    margin-top: 24px; width: 100%; padding: 15px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    font-size: 15px; font-weight: 700; box-shadow: 0 4px 16px var(--accent-glow);
    transition: all 0.15s;
  }
  .home-btn:active { transform: scale(0.98); }

  /* History */
  .history-toggle {
    width: 100%; padding: 13px; border-radius: var(--radius-sm); margin-top: 14px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--fg-dim); font-size: 13px; font-weight: 600; transition: all 0.2s;
  }
  .history-toggle:active { background: var(--surface2); }

  .grip-header {
    font-size: 12px; font-weight: 700; color: var(--accent);
    padding: 10px 0 4px; margin-top: 2px;
    border-top: 1px solid var(--border); letter-spacing: 0.3px;
  }
  .grip-header:first-of-type { border-top: none; margin-top: 0; }

  .history-entry {
    background: var(--surface); border-radius: var(--radius-sm); padding: 13px 14px;
    margin-top: 8px; border: 1px solid var(--border); font-size: 13px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; flex-wrap: wrap; transition: border-color 0.2s; box-shadow: var(--shadow);
  }
  .history-entry:active { border-color: var(--border-light); }

  /* Stats */
  .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-top: 4px; }
  .stats-header h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

  .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 16px 10px; text-align: center; box-shadow: var(--shadow);
  }
  .stat-card .stat-val { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .stat-card .stat-label { font-size: 10px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }

  .stats-section { margin-bottom: 24px; }
  .stats-section h3 {
    font-size: 11px; font-weight: 700; color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px;
  }

  .stat-ex-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .stat-ex-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .stat-ex-row { display: flex; justify-content: space-between; align-items: center; }
  .stat-ex-values { display: flex; gap: 4px; align-items: baseline; flex-wrap: wrap; }
  .stat-ex-values span {
    padding: 3px 8px; border-radius: 5px; font-size: 11px;
    background: var(--surface2); color: var(--fg-dim);
  }
  .stat-ex-values span:last-child { background: var(--accent-soft); color: var(--accent2); font-weight: 700; }
  .stat-pr { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 8px; letter-spacing: 0.3px; }
  .stat-arrow { font-size: 16px; font-weight: 700; }
  .stat-arrow.up { color: var(--green); }
  .stat-arrow.flat { color: var(--fg-dim); }
  .stat-arrow.down { color: var(--urgent); }

  .stat-empty { text-align: center; padding: 48px 20px; color: var(--fg-dim); font-size: 13px; }

  .history-detail {
    width: 100%; padding-top: 12px; margin-top: 12px;
    border-top: 1px solid var(--border); font-size: 12px;
  }
  .hd-exercise { margin-bottom: 12px; }
  .hd-name { font-weight: 700; font-size: 12px; color: var(--fg-mid); display: block; margin-bottom: 5px; }
  .hd-set-row { display: flex; align-items: center; gap: 5px; padding: 3px 0; }
  .hd-check {
    width: 22px; height: 22px; border-radius: 50%; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: var(--surface2); color: var(--fg-dim); border: none; transition: all 0.15s;
  }
  .hd-check.on { background: var(--accent); color: #fff; }
  .hd-check:active { transform: scale(0.9); }
  .hd-weight {
    width: 52px; padding: 4px 4px; border-radius: 5px; font-size: 11px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--fg); text-align: center; transition: all 0.2s;
  }
  .hd-weight:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent-soft); }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const ROUTINE = {
  1: {
    name: "Heavy Pull + Fingers",
    exercises: [
      { id: "pullups", name: "Weighted Pull-ups", sets: 6, reps: 5, type: "weight", rest: 180, inc: 2.5, warmup: 2 },
      { id: "hangs", name: "Hangboard Max Hangs", setsPerGrip: 3, hold: 10, type: "hang", rest: 180,
        grips: ["Half Crimp", "Three Finger Drag"] },
      { id: "legRaise", name: "Hanging Leg Raises", sets: 3, reps: 10, type: "bw", rest: 90 },
    ],
  },
  3: {
    name: "Push + Legs",
    exercises: [
      { id: "bench", name: "Barbell Bench Press", sets: 6, reps: 5, type: "weight", rest: 180, inc: 2.5, warmup: 2 },
      { id: "ohp", name: "Overhead Press", sets: 5, reps: 5, type: "weight", rest: 180, inc: 2.5, warmup: 2 },
      { id: "deadlift", name: "Deadlift", sets: 3, reps: 5, type: "weight", rest: 180, inc: 5, warmup: 2 },
    ],
  },
  5: {
    name: "Pulling Endurance + Rings",
    exercises: [
      { id: "ringPull", name: "Ring Rows", sets: 4, reps: 10, type: "weight", rest: 120 },
      { id: "ringDips", name: "Ring Dips", sets: 3, reps: 10, type: "weight", rest: 120, inc: 2.5 },
      { id: "repeaters", name: "Hangboard Repeaters", sets: 3, reps: 6, hold: 6, restIn: 3, type: "repeater", rest: 180, inc: 2.5 },
      { id: "legRaise2", name: "Hanging Leg Raises", sets: 3, reps: 10, type: "bw", rest: 90 },
    ],
  },
};

// State
let state = loadState();
let view = "home";
let currentDay = null;
let session = {};
let restTimer = null;
let restTotal = 0;
let restRemaining = 0;
let restInterval = null;
let showHistory = false;
let expandedHistory = new Set();

function loadState() {
  try {
    const raw = localStorage.getItem("climb-strong-v2");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { history: [], weights: {} };
}

function save() {
  try { localStorage.setItem("climb-strong-v2", JSON.stringify(state)); } catch(e) {}
}

function getExSets(ex) {
  return ex.grips ? ex.grips.length * ex.setsPerGrip : ex.sets;
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ":" + String(sec).padStart(2, "0");
}

function startRest(seconds) {
  clearInterval(restInterval);
  restTotal = seconds;
  restRemaining = seconds;
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      clearInterval(restInterval);
      restInterval = null;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
    render();
  }, 1000);
  render();
}

function skipRest() {
  clearInterval(restInterval);
  restInterval = null;
  restRemaining = 0;
  render();
}

function startDay(dayNum) {
  currentDay = dayNum;
  const day = ROUTINE[dayNum];
  session = {};
  day.exercises.forEach(ex => {
    const total = getExSets(ex);
    if (ex.type === "hang" && ex.grips) {
      const weights = [];
      for (let i = 0; i < total; i++) {
        const gi = Math.floor(i / ex.setsPerGrip);
        weights.push(state.weights[ex.id + "_" + gi] || null);
      }
      session[ex.id] = { sets: Array(total).fill(false), weights, reps: Array(total).fill(ex.hold || null) };
    } else {
      const lastW = state.weights[ex.id];
      const weights = [];
      const targetReps = ex.reps || null;
      for (let i = 0; i < total; i++) {
        if (ex.warmup && lastW && i < ex.warmup) {
          const pct = i === 0 ? 0.5 : 0.75;
          weights.push(Math.round(lastW * pct / 5) * 5);
        } else {
          weights.push(lastW || null);
        }
      }
      session[ex.id] = { sets: Array(total).fill(false), weights, reps: Array(total).fill(targetReps) };
    }
  });
  view = "workout";
  render();
  window.scrollTo(0, 0);
}

function logSet(exId, setIdx, restSec) {
  session[exId].sets[setIdx] = true;
  startRest(restSec);
  render();
}

function setWeight(exId, setIdx, val) {
  session[exId].weights[setIdx] = val;
  render();
}

function setReps(exId, setIdx, val) {
  session[exId].reps[setIdx] = val;
}

function unlogSet(exId, setIdx) {
  session[exId].sets[setIdx] = false;
  render();
}

function toggleHistoryDetail(idx) {
  if (expandedHistory.has(idx)) expandedHistory.delete(idx);
  else expandedHistory.add(idx);
  render();
}

function editHistoryWeight(histIdx, exId, setIdx, val) {
  state.history[histIdx].data[exId].weights[setIdx] = val;
  save();
}

function editHistoryReps(histIdx, exId, setIdx, val) {
  if (!state.history[histIdx].data[exId].reps) {
    const ex = Object.values(ROUTINE).flatMap(d => d.exercises).find(e => e.id === exId);
    const total = ex ? getExSets(ex) : state.history[histIdx].data[exId].sets.length;
    state.history[histIdx].data[exId].reps = Array(total).fill(ex?.reps || ex?.hold || null);
  }
  state.history[histIdx].data[exId].reps[setIdx] = val;
  save();
}

function toggleHistorySet(histIdx, exId, setIdx) {
  const sets = state.history[histIdx].data[exId].sets;
  sets[setIdx] = !sets[setIdx];
  save();
  render();
}

function renderHistoryDetail(h, histIdx) {
  const day = ROUTINE[h.day];
  if (!day) return "";
  let html = '<div class="history-detail" onclick="event.stopPropagation()">';
  day.exercises.forEach(ex => {
    const d = h.data[ex.id];
    if (!d) return;
    const total = getExSets(ex);
    html += `<div class="hd-exercise"><span class="hd-name">${ex.name}</span>`;
    for (let i = 0; i < total; i++) {
      const done = d.sets[i];
      const w = d.weights?.[i] ?? "";
      const r = d.reps?.[i] ?? (ex.reps || ex.hold || "");
      const isWarmup = ex.warmup && i < ex.warmup;
      const isHang = ex.type === "hang";
      const gripLabel = isHang ? (ex.grips?.[Math.floor(i / (ex.setsPerGrip || 1))] || "") : "";
      const setInGrip = isHang ? (i % ex.setsPerGrip) + 1 : i + 1;

      html += `<div class="hd-set-row" style="opacity:${done ? 1 : 0.4}">
        <button class="hd-check ${done ? "on" : ""}" onclick="toggleHistorySet(${histIdx},'${ex.id}',${i})">${done ? "✓" : setInGrip}</button>
        ${isWarmup ? '<span class="reps-label">W</span>' : ""}
        ${gripLabel && (i % ex.setsPerGrip === 0) ? `<span class="reps-label">${gripLabel}</span>` : isHang ? `<span class="reps-label" style="min-width:0"></span>` : ""}
        <input type="number" step="any" class="reps-input mono" value="${r}"
          onchange="editHistoryReps(${histIdx},'${ex.id}',${i},Number(this.value))">
        <span class="reps-label">${isHang ? "sec" : "reps"}</span>
        ${ex.type !== "bw" ? `<input type="number" step="any" class="hd-weight mono" value="${w}"
          placeholder="${isHang || ex.type === "repeater" ? "+lbs" : "lbs"}"
          onchange="editHistoryWeight(${histIdx},'${ex.id}',${i},Number(this.value))">` : ""}
      </div>`;
    }
    html += `</div>`;
  });
  html += '</div>';
  return html;
}

function finishWorkout() {
  const day = ROUTINE[currentDay];
  const newWeights = { ...state.weights };
  day.exercises.forEach(ex => {
    if (ex.type === "weight" || (ex.type === "repeater" && ex.inc)) {
      const d = session[ex.id];
      const workingSets = ex.warmup ? d.sets.slice(ex.warmup) : d.sets;
      const allDone = workingSets.every(Boolean);
      const lastW = d.weights[d.weights.length - 1];
      if (lastW && ex.inc) {
        newWeights[ex.id] = allDone ? lastW + ex.inc : lastW;
      } else if (lastW) {
        newWeights[ex.id] = lastW;
      }
    } else if (ex.type === "hang" && ex.grips) {
      const d = session[ex.id];
      ex.grips.forEach((grip, gi) => {
        const start = gi * ex.setsPerGrip;
        const gripWeights = d.weights.slice(start, start + ex.setsPerGrip).filter(Boolean);
        if (gripWeights.length > 0) {
          newWeights[ex.id + "_" + gi] = Math.max(...gripWeights);
        }
      });
    }
  });
  state.weights = newWeights;
  state.history.push({
    day: currentDay,
    date: new Date().toISOString().slice(0, 10),
    data: JSON.parse(JSON.stringify(session)),
  });
  save();
  view = "done";
  render();
  window.scrollTo(0, 0);
}

function goHome() {
  clearInterval(restInterval);
  restInterval = null;
  restRemaining = 0;
  view = "home";
  currentDay = null;
  showHistory = false;
  render();
  window.scrollTo(0, 0);
}

function getTotals() {
  if (!currentDay) return [0, 0];
  const day = ROUTINE[currentDay];
  let total = 0, done = 0;
  day.exercises.forEach(ex => {
    total += getExSets(ex);
    done += (session[ex.id]?.sets?.filter(Boolean).length || 0);
  });
  return [done, total];
}

// Render
function render() {
  const app = document.getElementById("app");
  if (view === "home") renderHome(app);
  else if (view === "workout") renderWorkout(app);
  else if (view === "done") renderDone(app);
  else if (view === "stats") renderStats(app);
}

function renderHome(el) {
  const lastByDay = {};
  state.history.forEach(h => { lastByDay[h.day] = h.date; });

  let html = `
    <div class="home-header" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <h1>Climblift</h1>
        <div class="sub">${state.history.length} workout${state.history.length !== 1 ? "s" : ""} logged</div>
      </div>
      <button class="stats-btn" onclick="showStats()">Stats</button>
    </div>`;

  Object.entries(ROUTINE).forEach(([num, day], i) => {
    const exNames = day.exercises.map(e => e.name).join(" · ");
    let tags = "";
    day.exercises.filter(e => e.type === "weight" || (e.type === "repeater" && e.inc)).forEach(ex => {
      const w = state.weights[ex.id];
      if (w) tags += `<span class="weight-tag mono">${ex.name.split(" ")[0]}: ${w} lbs</span>`;
    });
    day.exercises.filter(e => e.type === "hang" && e.grips).forEach(ex => {
      ex.grips.forEach((grip, gi) => {
        const w = state.weights[ex.id + "_" + gi];
        if (w) tags += `<span class="weight-tag mono">${grip}: +${w} lbs</span>`;
      });
    });

    html += `
      <button class="day-card" style="animation-delay:${i * 0.08}s" onclick="startDay(${num})">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="label mono">DAY ${num}</span>
          ${lastByDay[num] ? `<span class="last-date">Last: ${lastByDay[num]}</span>` : ""}
        </div>
        <h3>${day.name}</h3>
        <div class="exercises">${exNames}</div>
        ${tags ? `<div class="weight-tags">${tags}</div>` : ""}
      </button>`;
  });

  html += `
    <div class="info-box">
      <strong>Progression</strong><br>
      Complete all sets → weight goes up next session.<br>Miss a set → repeat the weight.
    </div>`;

  // History toggle
  if (state.history.length > 0) {
    html += `<button class="history-toggle" onclick="showHistory=!showHistory;render()">
      ${showHistory ? "Hide" : "Show"} History (${state.history.length})
    </button>`;

    if (showHistory) {
      const recent = [...state.history].reverse().slice(0, 20);
      recent.forEach((h, ri) => {
        const idx = state.history.length - 1 - ri;
        const expanded = expandedHistory.has(idx);
        html += `<div class="history-entry" onclick="toggleHistoryDetail(${idx})">
          <span>Day ${h.day} · ${ROUTINE[h.day]?.name || "Unknown"}</span>
          <span class="mono" style="color:var(--fg-dim);font-size:12px">${h.date} ${expanded ? "▲" : "▼"}</span>
          ${expanded ? renderHistoryDetail(h, idx) : ""}
        </div>`;
      });
    }
  }

  el.innerHTML = html;
}

function renderWorkout(el) {
  const day = ROUTINE[currentDay];
  const [done, total] = getTotals();
  const pct = total > 0 ? (done / total) * 100 : 0;

  let html = `
    <div class="workout-top">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <span class="mono" style="font-size:13px;color:var(--fg-dim)">${done}/${total} sets</span>
    </div>
    <div class="workout-title">
      <h2>Day ${currentDay}</h2>
      <div class="sub">${day.name}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  // Rest timer
  if (restInterval || restRemaining > 0) {
    const r = 54;
    const circ = 2 * Math.PI * r;
    const progress = restTotal > 0 ? restRemaining / restTotal : 0;
    const offset = circ * (1 - progress);
    const urgent = restRemaining <= 10 && restRemaining > 0;
    const col = urgent ? "var(--urgent)" : "var(--accent)";

    html += `
      <div class="rest-card">
        <div class="rest-label">Rest</div>
        <div class="timer-circle">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--track)" stroke-width="8"/>
            <circle cx="60" cy="60" r="${r}" fill="none" stroke="${col}" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
              transform="rotate(-90 60 60)"/>
          </svg>
          <div class="timer-text mono ${urgent ? "urgent" : ""}" style="color:${col}">
            ${fmt(restRemaining)}
          </div>
        </div>
        <button class="skip-btn" onclick="skipRest()">Skip</button>
      </div>`;
  }

  // Exercises
  day.exercises.forEach(ex => {
    const d = session[ex.id] || { sets: [], weights: [] };
    const totalSets = getExSets(ex);
    const cCount = d.sets.filter(Boolean).length;
    const allDone = cCount === totalSets;

    html += `<div class="ex-card ${allDone ? "complete" : ""}">
      <div class="ex-header">
        <h3>${ex.name}</h3>
        <span class="count mono">${cCount}/${totalSets}</span>
      </div>
      <div class="ex-meta">
        Rest: ${fmt(ex.rest)}${ex.type === "weight" && ex.inc ? ` · +${ex.inc} lbs/session` : ""}
      </div>`;

    if (ex.type === "hang" && ex.grips) {
      ex.grips.forEach((grip, gi) => {
        html += `<div class="grip-header">${grip}</div>`;
        for (let s = 0; s < ex.setsPerGrip; s++) {
          const i = gi * ex.setsPerGrip + s;
          const done = d.sets[i];
          const curReps = d.reps?.[i] ?? ex.hold;
          html += `
            <div class="set-row ${done ? "done" : ""}">
              <div class="set-num ${done ? "checked" : "pending"}">${done ? "✓" : s + 1}</div>
              <div class="set-info"><input type="number" step="any" class="reps-input mono" value="${curReps}"
                ${done ? "disabled" : ""} oninput="setReps('${ex.id}',${i},Number(this.value))">
                <span class="reps-label">sec</span></div>
              <input type="number" step="any" class="weight-input mono" value="${d.weights[i] || ""}"
                placeholder="+lbs" ${done ? "disabled" : ""}
                oninput="setWeight('${ex.id}',${i},Number(this.value))">
              <button class="log-btn ${done ? "inactive" : "active"}"
                onclick="${done ? `unlogSet('${ex.id}',${i})` : `logSet('${ex.id}',${i},${ex.rest})`}">
                ${done ? "Undo" : "Log"}
              </button>
            </div>`;
        }
      });
    } else {
      for (let i = 0; i < totalSets; i++) {
        const done = d.sets[i];
        const isWarmup = ex.warmup && i < ex.warmup;
        const curReps = d.reps?.[i] ?? ex.reps;

        let info = "";
        if (ex.type === "repeater") {
          info = `<input type="number" step="any" class="reps-input mono" value="${curReps}"
            ${done ? "disabled" : ""} oninput="setReps('${ex.id}',${i},Number(this.value))">
            <span class="reps-label">reps · ${ex.hold}s on/${ex.restIn}s off</span>`;
        } else if (ex.reps) {
          info = `${isWarmup ? '<span class="reps-label">Warmup · </span>' : ''}<input type="number" step="any" class="reps-input mono" value="${curReps}"
            ${done ? "disabled" : ""} oninput="setReps('${ex.id}',${i},Number(this.value))">
            <span class="reps-label">reps</span>`;
        }

        const weightInput = ex.type !== "bw"
          ? `<input type="number" step="any" class="weight-input mono" value="${d.weights[i] || ""}"
              placeholder="${ex.type === "repeater" ? "+lbs" : "lbs"}" ${done ? "disabled" : ""}
              oninput="setWeight('${ex.id}',${i},Number(this.value))">`
          : "";

        html += `
          <div class="set-row ${done ? "done" : ""}${isWarmup ? " warmup" : ""}">
            <div class="set-num ${done ? "checked" : "pending"}">${done ? "✓" : i + 1}</div>
            <div class="set-info">${info}</div>
            ${weightInput}
            <button class="log-btn ${done ? "inactive" : "active"}"
              onclick="${done ? `unlogSet('${ex.id}',${i})` : `logSet('${ex.id}',${i},${ex.rest})`}">
              ${done ? "Undo" : "Log"}
            </button>
          </div>`;
      }
    }
    html += `</div>`;
  });

  html += `<button class="finish-btn ${done === total ? "ready" : "not-ready"}" onclick="finishWorkout()">
    Finish Workout
  </button>`;

  el.innerHTML = html;
}

function renderDone(el) {
  const day = ROUTINE[currentDay];
  const [done, total] = getTotals();

  let progHtml = "";
  day.exercises.filter(e => e.type === "weight" || (e.type === "repeater" && e.inc)).forEach(ex => {
    const d = session[ex.id];
    const allDone = d?.sets?.every(Boolean);
    const lastW = d?.weights?.[d.weights.length - 1];
    if (lastW) {
      progHtml += `<div class="prog-row">
        <span class="name">${ex.name}</span>
        <span class="val mono ${allDone ? "up" : "same"}">
          ${lastW} lbs ${allDone ? "→ " + (lastW + ex.inc) : "(repeat)"}
        </span>
      </div>`;
    }
  });
  day.exercises.filter(e => e.type === "hang" && e.grips).forEach(ex => {
    const d = session[ex.id];
    ex.grips.forEach((grip, gi) => {
      const start = gi * ex.setsPerGrip;
      const gripWeights = d.weights.slice(start, start + ex.setsPerGrip).filter(Boolean);
      if (gripWeights.length > 0) {
        const maxW = Math.max(...gripWeights);
        progHtml += `<div class="prog-row">
          <span class="name">${grip}</span>
          <span class="val mono same">+${maxW} lbs</span>
        </div>`;
      }
    });
  });

  el.innerHTML = `
    <div class="done-screen">
      <div class="icon">🧗</div>
      <h1>Workout Complete</h1>
      <div class="sub">${day.name} · ${done}/${total} sets logged</div>
      ${progHtml}
      <button class="home-btn" onclick="goHome()">Back to Home</button>
    </div>`;
}

function showStats() {
  view = "stats";
  render();
  window.scrollTo(0, 0);
}

function renderStats(el) {
  const hist = state.history;
  const totalWorkouts = hist.length;

  // Workouts this week (Mon-Sun)
  const now = new Date();
  const dayOfWeek = (now.getDay() + 6) % 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek);
  monday.setHours(0, 0, 0, 0);
  const thisWeek = hist.filter(h => new Date(h.date + "T12:00:00") >= monday).length;

  // Streak: consecutive weeks with at least 1 workout
  let streak = 0;
  if (hist.length > 0) {
    const weekStart = d => {
      const dt = new Date(d + "T12:00:00");
      const dow = (dt.getDay() + 6) % 7;
      dt.setDate(dt.getDate() - dow);
      return dt.toISOString().slice(0, 10);
    };
    const weeks = new Set(hist.map(h => weekStart(h.date)));
    let check = new Date(monday);
    while (weeks.has(check.toISOString().slice(0, 10))) {
      streak++;
      check.setDate(check.getDate() - 7);
    }
  }

  let html = `
    <div class="stats-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2>Progression</h2>
      <div></div>
    </div>
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-val mono">${totalWorkouts}</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-val mono">${thisWeek}</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-val mono">${streak}w</div>
        <div class="stat-label">Streak</div>
      </div>
    </div>`;

  if (totalWorkouts === 0) {
    html += `<div class="stat-empty">Complete a workout to see your progression.</div>`;
    el.innerHTML = html;
    return;
  }

  // Gather per-exercise data from history
  const exData = {};
  const allExercises = [];
  Object.values(ROUTINE).forEach(day => {
    day.exercises.forEach(ex => {
      if (!allExercises.find(e => e.id === ex.id)) allExercises.push(ex);
    });
  });

  allExercises.forEach(ex => {
    if (ex.type === "weight" || (ex.type === "repeater" && ex.inc)) {
      const entries = [];
      hist.forEach(h => {
        const d = h.data[ex.id];
        if (d) {
          const ws = d.weights.filter(Boolean);
          if (ws.length > 0) entries.push({ date: h.date, weight: Math.max(...ws), allDone: d.sets.every(Boolean) });
        }
      });
      if (entries.length > 0) exData[ex.id] = { type: "weight", name: ex.name, entries };
    } else if (ex.type === "hang" && ex.grips) {
      ex.grips.forEach((grip, gi) => {
        const key = ex.id + "_" + gi;
        const entries = [];
        hist.forEach(h => {
          const d = h.data[ex.id];
          if (d) {
            const start = gi * (ex.setsPerGrip || 1);
            const end = start + (ex.setsPerGrip || 1);
            const ws = d.weights.slice(start, end).filter(Boolean);
            if (ws.length > 0) entries.push({ date: h.date, weight: Math.max(...ws) });
          }
        });
        if (entries.length > 0) exData[key] = { type: "hang", name: grip, entries };
      });
    }
  });

  // Strength progression
  const weightExKeys = Object.keys(exData).filter(k => exData[k].type === "weight");
  if (weightExKeys.length > 0) {
    html += `<div class="stats-section"><h3>Strength</h3>`;
    weightExKeys.forEach(k => {
      const d = exData[k];
      const recent = d.entries.slice(-6);
      const pr = Math.max(...d.entries.map(e => e.weight));
      const last = recent[recent.length - 1].weight;
      const prev = recent.length > 1 ? recent[recent.length - 2].weight : last;
      const arrow = last > prev ? "↑" : last < prev ? "↓" : "→";
      const arrowClass = last > prev ? "up" : last < prev ? "down" : "flat";

      html += `<div class="stat-ex-card">
        <div class="stat-ex-name">${d.name}</div>
        <div class="stat-ex-row">
          <div class="stat-ex-values">
            ${recent.map(e => `<span class="mono">${e.weight}</span>`).join("")}
          </div>
          <span class="stat-arrow ${arrowClass}">${arrow}</span>
        </div>
        <div class="stat-pr">PR: ${pr} lbs</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Hangboard progression
  const hangKeys = Object.keys(exData).filter(k => exData[k].type === "hang");
  if (hangKeys.length > 0) {
    html += `<div class="stats-section"><h3>Hangboard</h3>`;
    hangKeys.forEach(k => {
      const d = exData[k];
      const recent = d.entries.slice(-6);
      const pr = Math.max(...d.entries.map(e => e.weight));
      const last = recent[recent.length - 1].weight;
      const prev = recent.length > 1 ? recent[recent.length - 2].weight : last;
      const arrow = last > prev ? "↑" : last < prev ? "↓" : "→";
      const arrowClass = last > prev ? "up" : last < prev ? "down" : "flat";

      html += `<div class="stat-ex-card">
        <div class="stat-ex-name">${d.name}</div>
        <div class="stat-ex-row">
          <div class="stat-ex-values">
            ${recent.map(e => `<span class="mono">+${e.weight}</span>`).join("")}
          </div>
          <span class="stat-arrow ${arrowClass}">${arrow}</span>
        </div>
        <div class="stat-pr">PR: +${pr} lbs</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Recent workouts
  html += `<div class="stats-section"><h3>Recent Workouts</h3>`;
  const recentStats = [...hist].reverse().slice(0, 10);
  recentStats.forEach((h, ri) => {
    const idx = hist.length - 1 - ri;
    const expanded = expandedHistory.has(idx);
    const day = ROUTINE[h.day];
    const d = h.data;
    let setsLogged = 0, totalSets = 0;
    if (day) {
      day.exercises.forEach(ex => {
        const total = getExSets(ex);
        totalSets += total;
        setsLogged += (d[ex.id]?.sets?.filter(Boolean).length || 0);
      });
    }
    html += `<div class="history-entry" onclick="toggleHistoryDetail(${idx})">
      <div>
        <div style="font-weight:600">Day ${h.day} · ${day?.name || "Unknown"}</div>
        <div style="font-size:11px;color:var(--fg-dim);margin-top:2px">${setsLogged}/${totalSets} sets</div>
      </div>
      <span class="mono" style="color:var(--fg-dim);font-size:12px">${h.date} ${expanded ? "▲" : "▼"}</span>
      ${expanded ? renderHistoryDetail(h, idx) : ""}
    </div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
}

// Init
render();
</script>
</body>
</html>
